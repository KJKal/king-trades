<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KINGTRADES • Trading Journal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <!-- Firebase SDK (compat version for single HTML file) -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        :root { --tw-color-primary: #22c55e; }
        * { transition-property: color, background-color, border-color, text-decoration-color, fill, stroke; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }
        .dark { background-color: #0a0a0a; }
        .card { background: linear-gradient(145deg, #111113, #1a1a1e); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3); }
        .modal { animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalPop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .calendar-day { border-radius: 24px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 1px 3px rgba(255,255,255,0.05); }
        @media (max-width: 1023px) { .sidebar { display: none; } .main-content { padding-top: 3.5rem; } .calendar-day { height: 76px; } }
        @media (min-width: 1024px) { .mobile-header { display: none; } }
    </style>
</head>
<body class="dark bg-[#0a0a0a] text-gray-200 font-inter">

<!-- (All the UI you already like is here - mobile header, sidebar, screens, modals, etc.) -->
<!-- For brevity I'm showing only the important Firebase part. The full UI is identical to the last responsive version you had. -->

<script>
    // ==================== PASTE YOUR FIREBASE CONFIG HERE ====================
    const firebaseConfig = {
    apiKey: "AIzaSyAZVJA2Btc0W4qCycu61qCONN35rOEcGXw",
    authDomain: "kingtrades-trading-journal.firebaseapp.com",
    projectId: "kingtrades-trading-journal",
    storageBucket: "kingtrades-trading-journal.firebasestorage.app",
    messagingSenderId: "835415199615",
    appId: "1:835415199615:web:3cb38bd135d53aeb8b944a",
    measurementId: "G-T12TGMQXWK"
  };
    // =======================================================================

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let journalData = { initialBalance: 10000, orders: [], realizedTrades: [], equityHistory: [] };
    let currentUser = null;

    // Sign-in button
    function signInWithGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider).catch(e => alert("Sign-in error: " + e.message));
    }

    auth.onAuthStateChanged(user => {
        currentUser = user;
        if (user) {
            loadFromFirestore();
        } else {
            // Show sign-in button (you can add a nice banner if you want)
            console.log("Please sign in with Google");
        }
    });

    async function loadFromFirestore() {
        if (!currentUser) return;
        const doc = await db.collection("users").doc(currentUser.uid).get();
        if (doc.exists) journalData = doc.data();
        renderDashboard();
        renderCalendar();
        renderTrades();
    }

    async function saveToFirestore() {
        if (!currentUser) return;
        await db.collection("users").doc(currentUser.uid).set(journalData);
    }

    function saveToLocalStorage() { saveToFirestore(); }

    // === ALL YOUR PREVIOUS FUNCTIONS (parseCSV, renderDashboard, renderCalendar, etc.) ===
    // (They are exactly the same as the last fully-working responsive version you had)

    // ... [paste the entire script from the last responsive version here - it's unchanged] ...

    function launchJournal() {
        initTailwind();
        renderDashboard();
        renderCalendar();
        renderTrades();
        console.log('%c✅ KINGTRADES with Firebase sync is LIVE!', 'background:#22c55e;color:#000;font-size:11px');
    }
    window.onload = launchJournal;
</script>
</body>
</html>
